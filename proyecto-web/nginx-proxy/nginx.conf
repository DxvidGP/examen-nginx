# ─────────────────────────────────────────────
#  nginx.conf  —  Proxy inverso con balanceo
# ─────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {

    # ── Upstream: los dos backends Apache ──
    upstream backends {
        # Round-robin por defecto (sin directiva extra)
        server web1:80;
        server web2:80;
    }

    # ── Servidor principal: escucha en :80 ──
    server {
        listen 80;
        server_name _;

        # Cabecera para identificar qué backend respondió
        # $upstream_addr contiene IP:puerto del backend seleccionado
        add_header X-Backend-Server $upstream_addr always;
        add_header X-Proxy          "nginx-lb"     always;

        location / {
            proxy_pass         http://backends;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts razonables
            proxy_connect_timeout  5s;
            proxy_read_timeout    30s;
        }

        # ── Endpoint de estado (healthcheck / diagnóstico) ──
        location /nginx-status {
            stub_status on;
            allow all;
        }
    }
}
